{% extends 'core/base.html' %}
{% block content %}
<h2>帖子列表</h2>
{% for post in posts %}
  <div class="card mb-2">
    <div class="card-body">
      <h5>
        <a href="{% url 'post_detail' post.id %}" class="text-decoration-none text-dark">
          {{ post.title }}
        </a>
        {% if post.author == 'mcytd' %}<span class="badge bg-warning text-dark">官方帖</span>{% endif %}
      </h5>
      <small class="text-muted">作者：{{ post.author }} | {{ post.created_at|date:"Y-m-d H:i" }}</small>
    </div>
  </div>
{% empty %}
  <p class="empty-state">暂无帖子。</p>
{% endfor %}
{% endblock %}
