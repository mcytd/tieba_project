{% extends 'core/base.html' %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h2>{{ post.title }}{% if post.author == 'mcytd' %}<span class="badge bg-warning text-dark ms-2">官方帖</span>{% endif %}</h2>
    <p class="text-muted">作者：{{ post.author }} | {{ post.created_at|date:"Y-m-d H:i" }}</p>
    <hr>
    <p>{{ post.content|linebreaksbr }}</p>
    <a href="/" class="btn btn-outline-secondary">← 返回列表</a>
  </div>
</div>
{% endblock %}
